name: ci

# Build and test the toonwriter library on every pull request and on pushes to
# main, across the toolchains/targets the project aims to support: clang and gcc
# on Linux and macOS (arm64, plus opt-in x86-64), mingw64 cross-compiled to
# Windows, musl on Alpine, and emscripten to WebAssembly. Modeled on json2toon's
# CI (itself modeled on liquidaty/zsv), adapted for a static-library-only project
# with no SIMD/shared-library build.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      macos_intel:
        description: 'Also run the Intel (x86_64) macOS job'
        required: false
        type: boolean
        default: false

# Only the latest run for a given branch/PR needs to finish; cancel the rest.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  # --------------------------------------------------------------- Linux
  linux:
    name: linux (${{ matrix.cc }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        cc: [gcc, clang]
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: CC=${{ matrix.cc }} ./configure
      - name: Build (library)
        run: make build
      - name: Test
        run: make test

  # AddressSanitizer + UndefinedBehaviorSanitizer (LeakSanitizer included).
  sanitizers:
    name: linux (asan+ubsan)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: ./configure
      - name: Test under sanitizers
        run: make ASAN=1 test

  # Strict-warnings lane: compile the library TU under an explicit standard with
  # -Werror -Wconversion -Wshadow -Wstrict-prototypes -Wvla, on both compilers.
  # Catches implicit narrowing / shadowing the default build tolerates.
  strict:
    name: linux (strict-warnings)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: ./configure
      - name: Strict compile (gcc)
        run: make strict CC=gcc
      - name: Strict compile (clang)
        run: make strict CC=clang

  # --------------------------------------------------------------- macOS
  # Apple-silicon (arm64) runs on every push/PR; it's plentiful and fast.
  macos:
    name: macos (arm64)
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: ./configure
      - name: Build (library)
        run: make build
      - name: Test
        run: make test

  # Intel (x86_64) macOS is opt-in only: the macos-13 runner pool is scarce and
  # being deprecated, so it can queue for minutes. The x86 code paths are also
  # covered by the Linux gcc/clang jobs. Run it on demand via "Run workflow" with
  # the "macos_intel" box checked.
  macos-intel:
    name: macos (x86_64, manual)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.macos_intel }}
    runs-on: macos-13
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: ./configure
      - name: Build (library)
        run: make build
      - name: Test
        run: make test

  # ----------------------------------------------- Windows (mingw cross)
  # Cross-compile from Linux with mingw-w64. The produced artifacts are PE/COFF
  # and cannot run on the Linux host, so this job builds the library plus a test
  # binary and verifies they are Windows artifacts rather than running the suite.
  windows-mingw:
    name: windows (mingw64 cross-compile)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install mingw-w64
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64
      - name: Configure (cross to Windows)
        env:
          CC: x86_64-w64-mingw32-gcc
          AR: x86_64-w64-mingw32-ar
          RANLIB: x86_64-w64-mingw32-ranlib
          CROSS_COMPILING: 'yes'
        run: ./configure
      - name: Build (library)
        run: make build
      - name: Build and verify Windows artifacts
        run: |
          builddir=$(make print-builddir | tail -1)
          lib="$builddir/lib/libtoonwriter.a"
          testbin="$builddir/bin/test.exe"
          # Build a consumer (the test binary) to prove the archive links into a
          # Windows PE; do not run it (it's a PE32+ executable, not a Linux ELF).
          make "$testbin"
          file "$lib" "$testbin"
          file "$lib" | grep -q 'archive'
          file "$testbin" | grep -q 'PE32+ executable'

  # --------------------------------------------------------------- musl
  # Build and test under musl libc on Alpine (validates non-glibc portability).
  musl:
    name: linux (musl)
    runs-on: ubuntu-latest
    container: alpine:3.20
    timeout-minutes: 10
    steps:
      # Alpine ships busybox 'sh' but not bash; the workflow-level default shell
      # is bash, so this first step must explicitly use sh to install it.
      - name: Install toolchain
        shell: sh
        run: apk add --no-cache build-base make bash git
      - uses: actions/checkout@v4
      - name: Configure
        run: ./configure
      - name: Build (library)
        run: make build
      - name: Test
        run: make test

  # ----------------------------------------------------- WebAssembly
  # Cross-compile to WASM with emscripten and run the test suite under Node. The
  # Makefile's `test` target execs the test binary directly, which a WASM artifact
  # can't do, so build the binary and invoke its emitted JS launcher via node.
  wasm:
    name: wasm (emscripten)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up emsdk
        uses: mymindstorm/setup-emsdk@v14
      - name: Set up Node.js
        uses: actions/setup-node@v4
      - name: Configure (emscripten)
        env:
          CROSS_COMPILING: 'yes'
        run: emconfigure ./configure
      - name: Build and run test binary under Node
        run: |
          # Resolve the per-config build dir under the same emmake environment
          # used to build (so CC=emcc is reflected), build the test binary there,
          # then run the emitted JS launcher with Node.
          testbin="$(emmake make print-builddir | tail -1)/bin/test"
          emmake make "$testbin"
          node "$testbin"

  # ----------------------------------------------------------- fuzzing
  # Short libFuzzer session (clang + libFuzzer), plus a build of the portable
  # standalone replay driver. The macOS build host can't fuzz (Apple clang lacks
  # libFuzzer), so this is the canonical fuzz coverage.
  fuzz:
    name: linux (fuzz, clang+libFuzzer)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: CC=clang ./configure
      - name: Build the portable replay driver
        run: make fuzz-standalone
      - name: Build the libFuzzer target
        run: make fuzz FUZZ_CC=clang
      - name: Fuzz
        run: |
          bin="$(make print-builddir | tail -1)/bin/fuzz"
          mkdir -p corpus
          "$bin" -max_total_time=60 -print_final_stats=1 corpus
